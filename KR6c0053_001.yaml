body:
  text: 金剛般若波羅蜜經世傳有加佛說二字謂佛說金剛般若等此後人謬加須知經通五人說謂佛菩薩弟子天仙化人五人也若部內兼四人說者題中不稱佛說若一經始終金口所說者題標佛說字揀非兼四人所說也然何以稱經須知雖四人所說為佛印定即同佛說故得稱經大論云下四印定通云佛說若爾既通云佛說題標佛說有何不可須知通云佛說乃得稱經非金口所說若金口所說唯一席而已且此經凡有六譯若什公與魏菩提流支及陳真諦此三譯同名金剛般若等若隋笈多謂金剛能斷般若其大唐奘法師與大周義淨此二譯同名能斷金剛般若是即由立題不同遂釋義有異笈多以能斷二字在金剛後則取金剛堅利以喻般若曰金剛能斷般若乃喻法立題若奘師義淨以能斷二字在金剛前如云菩薩堅執猶如金剛以般若空慧能斷此執故云能斷金剛般若如慈恩傳乃成單法立題既以般若空慧為能斷金剛為所斷豈非單法相傳海東曉師亦有疏釋此經乃同奘師之說皆無取也無著論以法喻立題而什公等皆符合論意百鍊不消須知非但金剛只如此間邠鐵亦百鍊不消也筆談顯示不共此對初義別在此經故云不共然與下文文相有異不可一例波羅蜜梵語波羅此云彼岸蜜此云到若回文順俗故云到彼岸準諸文略云三飜諸經多飜為到彼岸生死此岸涅槃彼岸煩惱中流菩薩以無相妙慧乘禪定舟航從生死此岸渡涅槃彼岸或飜事究竟如摩訶衍論云天竺語法凡所作事畢則云波羅蜜或飜度無極通論事理悉有幽遠之義合而言之故云度無極此約事理行滿曰無極三一總別然總別不應雙舉譬如拳指言總則總無別總覧別為總如合指為拳唯拳無指言別則別無別別開總為別如開拳為指唯指無拳若爾如何總別雙存謂三一總別耶須知一是總題乃總覽一經大義則題中義含體宗用故云總也三是所詮別文就別文說出體宗用故云別也有此文義兩途故云三一總別乃得雙舉慈氏彌勒號慈氏如華嚴法界品云或見彌勒最初證慈心三昧從是已來號慈氏何意復造論作十八住釋經淨覺謂八十頌在十八住論後者非也義淨三藏云此經西方乃有多釋考其始也此頌最先則八十頌事必屬正亦如法華謂從三昧安詳而起雖未彰言事必屬正三疑兢起自舊反於此有總別兩疑且總疑者既集一千無疑羅漢何故却有疑耶別疑者且小乘灰斷如何却疑釋尊重出耶小乘無它佛之談如何疑它方佛來耶小乘無作佛之分如何疑阿難成佛耶今為伸釋且總疑者羅漢於四諦理上決定無疑於事上不了故有疑耳如羅漢不識赤鹽等若別疑者以小教不詮故云無也所以懷疑者由迦葉禮敬而生一千羅漢各各懷猶豫疑情共有此三非謂唱起所疑也且小乘亦知有他方佛但謂一佛各化一方而不知十方諸佛悉是釋迦分身謂無它佛之談此乃四明答楊大年書語自舊或謂權疑為啟當來誠信者若爾阿難被黜出乃見經論所說再來入窟亦經論明文何以却不見再來之文謂事非彰灼故設權疑或謂實疑謂形容似佛眾不識故疑且大論明結集時迦葉單白和僧阿難方登寶座若爾何人不知高座是阿難而却云不識故疑耶況佛乃黃金色相大眾一覩便了若微細律合論引未見其律本文恐阿難結集時形容精爽威儀似佛諸天奉侍如奉世尊故云似佛多聞聞物此兩聞字須知多聞乃知聞屬自聞物乃傳聞屬他不仰不下不方不維不仰則不仰口食仰觀星宿占相吉凶也不下則不下口食墾土掘地種植田園也不方則不方口食通致使命馳走四方也不維維不正四維也謂醫藥卜算小術而求食此四曰四種邪食四王所奉鉢四天王各奉一鉢佛不偏故俱受所獻遂拍為一今鉢盂有四除慢佛乃淨飯王之子既行乞食教中所制若見餘比丘行乞無輕慢也初廣大心即弘誓心弘者大也所有一切眾之類則三界四生並入弘誓願數而滅度之有人認作如來度生者謬矣唯然唯者諾禮對然者領受為欲審是所以斥非欲審其是義須反顯若菩薩於一切眾生所不起它相皆如自體則信解自它平等故豈有我人等見真是菩薩如是則心不顛倒也寶積經等經云正法滅時對邪稱正則佛法滅時也三不現前則三寶隱沒時也此須末法最後時謂五百歲應以大集為正有人謂後五百歲指正法一千年後五百年對前為後應分二五此說有違寶積事福本空本空即妙性也若爾下文較量何似至於極少首題一句一部同詮實相豈可只四句有功德耶大師云文文之下通結妙名句句之中咸具體等可以比知初果後進斷欲思六品下地思有九品共潤七番生死九品者上中下大三品每一品開三成九則上上一品能潤二生上中上下及中上三品各潤一生其中中中下共潤一生是即斷六品盡能潤六番生死乃證二果羅漢有二種即慧俱二種也有退不退若俱人得滅盡定則不退慧人不得滅盡定則退但是以聖退聖終無以聖退凡譬如沙井中間若墮真至於底方住乃從四果退至初果而住作初果人所為事且退者即生再得無有隔生得者多是慧解脫人論牒文論中凡兩番牒文一如七義句於發啟行相中次正釋經並以恒河沙數為句逗依論讀文方為允當以佛世為別相等別相者三相各別如淨名經云始坐道樹力降魔得甘露滅覺道成三轉法輪於大千其輪本來常清淨人天得道此為證於是三寶現世間故知自迦葉佛入滅之後三寶隱沒人天減少三惡道充滿釋迦如來出世方始三寶出現世間故云於是三寶現世間也此云別相對一體得名二住持滅後說由如來成道已思報母恩其母摩耶夫人已入滅生忉利天而如來九十日昇天為母說法蔽諸大眾皆不令知時國主優填王憶佛故以紫檀香時毗首羯摩化作人匠為王雕造如來形像自此有刻檀佛像九十日夏滿佛化三道寶堦從天降下是時國王人民皆來迎佛時旃檀像亦塗步來迎如來為摩旃檀像頂云我滅度後汝當住持世間廣為人天而作佛事自此有住持之名阿闍世王造逆身瘡發動於涅槃會遇佛聞法身瘡即俞獲無根信忍遂發心日供千僧如來滅後迦葉欲結集法藏擬行乞食恐外道惡人難問妨廢光陰不如就闍王千分之供遂集一千羅漢於畢鉢羅窟結集自此有教法住持世間阿育王造八萬四千寶塔度八萬四千人為僧自此有剃染之僧住持世間且相從三寶須知此一種三寶別無有法只是以佛世滅後合而言之由佛世三故有滅後三故曰相從此並屬事論云如我昔為歌利王等此由安住實相理故不愁惱故云爾時無有我人等相也既住實相則實相無相故云及無相也無相不相無生死相不涅槃相離二邊故故云亦非無相也大論引迦旃延子等迦旃延子依阿含經說菩薩三祇百劫不斷惑所謂迦旃延子自以聰明利根不讀衍經非大菩薩是故龍樹於大論處處以衍斥之如云菩薩不斷結是名大錯等然則旃延既準阿含經說菩薩不斷結乃有憑據所以荊溪云阿含既云菩薩不斷結而大論斥權非謂全無則亦有菩薩不斷結義故著非謂全無之語但旃延子不合專憑小教是以大論處處破之乃破其偏執小耳於中略說有四種眼論釋有二意一通釋二辯折於辯折有四種眼四種俱約五眼色攝復有二種世智第一義智二種也問論中而於色攝中復開二種智者何耶答有二意一者顯事必即理故二明二智一體故然此二義實一意耳由事即理故二諦一體且初義者色是事於中開出第一義理者顯事必即理故若事不即理世智九界則顛倒轉論云第一義智力故世智不顛倒轉由即理故不顛倒轉二二智一體者此約圓詮事理體一故以世智全是第一義智第一義智全是世智雖分二智實無二體蓋一體相即是故於色攝一法中開此二種也譬如波水全波是水全水是波波水雖異而無二也須知五眼者實果佛所證法門而無著菩薩釋此以四種五眼辯折雖文約而義周妙盡圓旨與今天台所說符契自非內證本同所覧怜然焉以臻此法界修果等法界即十法界果曰修果修則屬事五眼麤境界故色攝十界者肉天二眼則六凡界慧眼則二乘界法眼則菩薩界佛眼則佛界問若以十界釋佛眼者以下凡地獄等界如何以釋佛眼耶答十法界果實由佛果五眼能具故約十法界以釋五眼則不可以下凡地獄等界為妨難故止觀云佛具五眼豈可人天果報釋佛眼輔行釋云舉一佛果具於十界然不可以聖陰陰即果也同凡自是佛果能具十界終不可以佛地獄界以為凡夫地獄界用釋佛眼也若爾且十界俱屬佛果以何受稱當知十界既由佛果能具還從佛果果德受稱果德者常樂我淨四德也如荊溪云二千果成咸稱常樂斯之謂歟三千則十界然若不得今家祖意消釋而論文便見沈匿論謂在先即指前經文五眼即是為令知見淨勝義即第一義更不重述故指在先三世諦攝論中不釋而次第一義者由世諦分別故所以佛之肉眼雖同凡夫所見佛過彼所見佛之天眼同天所見佛過彼所見所謂真天眼也佛之慧眼同二乘見空而佛過彼所見佛之法眼同菩薩見假而佛過彼所見佛之佛眼圓照無私對五境異遂有五用謂之五眼以菩提法得知是佛菩提法者謂十界三諦平等之法唯佛與佛乃能究顯不受苦惱受人天富樂故雖不說亦自知是聚等雖不說微塵眾亦自知是眾塵聚集何義須說所以說者為顯無所見方便空義故謂即非微塵眾也由上但觀名色等上但約色及眾生身摶取中觀破相應行斯即名色身合說不開摶取此中為破妄報而名色之外別報名色之身是故別開摶取故云世界實有者即是一合相且一合相者空也而不知四蘊及眾塵摶取和合謂一合相豈是真實如此顯之名色身報情可以遣蕩是故須菩提為安立第一義空故說一合相世尊為成就空生所說故謂即非一合相也若智依止奢摩他故知奢摩他此云止所謂以止止散即散而寂散動則不知寂靜則能知依止毗鉢舍那故見毗鉢舍那此云見由觀能見所謂以觀觀平聲昏即昏而即昏暗則不見明即則能見吾祖云明靜者止觀之體也是則止觀等持乃知見實理非見實不能知乃見實理而能證知故於一切法無所分別采微其有缺辯及文略者所以再行料理補餘未釋區區但欲結般若良緣耳乾道陸年太歲庚寅仲夏曇應題金剛經集解四卷宋楊圭編金剛經四十二分說一卷宋張無盡述
